<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Landing Page Premium</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f3f3;
}

.wrapper{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:20px;
    padding:20px;
}

.panel{
    background:#fff;
    border-radius:14px;
    padding:20px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

h2{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-size:14px;
    font-weight:bold;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

textarea{
    resize:none;
    min-height:100px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ee4d2d;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
}

iframe{
    width:100%;
    height:95vh;
    border:none;
    border-radius:14px;
    background:#fff;
}

.small{
    font-size:12px;
    color:#777;
    margin-top:5px;
}

@media(max-width:900px){

    .wrapper{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="wrapper">

    <!-- PANEL -->
    <div class="panel">

        <h2>Generator Landing Page</h2>

        <div class="form-group">
            <label>Nama Produk</label>
            <input type="text" id="productName" value="CREAM WHITENING SPF50">
        </div>

        <div class="form-group">
            <label>Harga Sekarang</label>
            <input type="text" id="priceNow" value="149000">
        </div>

        <div class="form-group">
            <label>Harga Coret</label>
            <input type="text" id="priceOld" value="195000">
        </div>

        <div class="form-group">
            <label>Gambar 1</label>
            <input type="text" id="img1" value="https://down-id.img.susercontent.com/file/id-11134207-822wh-mmpmrwn2d1qbaf.webp">
        </div>

        <div class="form-group">
            <label>Gambar 2</label>
            <input type="text" id="img2" value="https://down-id.img.susercontent.com/file/id-11134207-822wk-mmksshp7x1c34f">
        </div>

        <div class="form-group">
            <label>Gambar 3</label>
            <input type="text" id="img3" value="https://down-id.img.susercontent.com/file/id-11134207-8224y-mioncgoznc3rfb">
        </div>

        <div class="form-group">
            <label>Gambar 4</label>
            <input type="text" id="img4" value="">
        </div>

        <div class="form-group">
            <label>Gambar 5</label>
            <input type="text" id="img5" value="">
        </div>

        <div class="form-group">
            <label>Deskripsi Umum</label>
            <textarea id="description">Cream whitening SPF50 membantu mencerahkan dan melindungi kulit dari sinar UV.</textarea>
        </div>

        <div class="form-group">
            <label>Judul Deskripsi 1</label>
            <input type="text" id="descTitle1" value="Perlindungan SPF 50">
        </div>

        <div class="form-group">
            <label>Isi Deskripsi 1</label>
            <textarea id="descText1">Melindungi kulit dari sinar UV dan menjaga kulit tetap cerah sepanjang hari.</textarea>
        </div>

        <div class="form-group">
            <label>Judul Deskripsi 2</label>
            <input type="text" id="descTitle2" value="Mencerahkan Wajah">
        </div>

        <div class="form-group">
            <label>Isi Deskripsi 2</label>
            <textarea id="descText2">Membantu membuat wajah tampak lebih glowing dan sehat alami.</textarea>
        </div>

        <div class="form-group">
            <label>Nama Toko</label>
            <input type="text" id="shopName" value="venolliastore.com">
        </div>

        <div class="form-group">
            <label>Embed Code OrderOnline</label>
            <textarea id="embedCode"></textarea>

            <div class="small">
                Paste embed code OrderOnline di sini
            </div>
        </div>

        <button onclick="generatePage()">
            GENERATE LANDING PAGE
        </button>

    </div>

    <!-- PREVIEW -->
    <div class="panel">
        <iframe id="preview"></iframe>
    </div>

</div>

function rupiah(number){
    return "Rp " + Number(number).toLocaleString("id-ID");
}

    const img4 = document.getElementById("img4").value;

    const descText1 = document.getElementById("descText1").value;

    const descTitle2 = document.getElementById("descTitle2").value;
    const descText2 = document.getElementById("descText2").value;

    const shopName = document.getElementById("shopName").value;

</html>
