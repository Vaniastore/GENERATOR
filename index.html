

<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:500px;
    margin:auto;
    background:#fff;
}

.swiper{
    width:100%;
    aspect-ratio:1/1;
}

.swiper img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.flash-sale{
    background:#ee4d2d;
    color:#fff;
    padding:15px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
}

.content{
    padding:15px;
}

.price{
    color:#ee4d2d;
    font-size:30px;
    font-weight:bold;
}

.old-price{
    color:#999;
    text-decoration:line-through;
    margin-left:10px;
}

.title{
    margin-top:12px;
    font-size:22px;
    font-weight:bold;
}

.rating{
    margin-top:10px;
    color:#666;
}

.shop{
    margin-top:20px;
    padding:15px;
    background:#fafafa;
    border:1px solid #eee;
    border-radius:10px;
}

.section{
    margin-top:25px;
}

.section-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
}

.feature-card{
    border:1px solid #eee;
    border-radius:12px;
    overflow:hidden;
    margin-bottom:20px;
}

.feature-card img{
    width:100%;
}

.feature-content{
    padding:15px;
}

.feature-title{
    font-size:18px;
    font-weight:bold;
    margin-bottom:10px;
}

.feature-text{
    line-height:1.7;
    color:#555;
}

.gallery-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.gallery-item{
    border-radius:12px;
    overflow:hidden;
    border:1px solid #eee;
}

.gallery-item img{
    width:100%;
    display:block;
}

.buy-btn{
    width:100%;
    border:none;
    padding:16px;
    background:#ee4d2d;
    color:#fff;
    border-radius:10px;
    font-weight:bold;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

    <!-- SLIDER -->

    <div class="swiper mySwiper">

        <div class="swiper-wrapper">

            

            

            

            

            

        </div>

        <div class="swiper-pagination"></div>

    </div>

    <div class="flash-sale">

        <div>FLASH SALE</div>

        <div>STOK TERBATAS</div>

    </div>

    <div class="content">

        <div>

            <span class="price">Rp 0</span>

            <span class="old-price">Rp 0</span>

        </div>

        <div class="title">
            
        </div>

        <div class="rating">
            ⭐ 4.9 | 2.5RB+ Terjual
        </div>

        <div class="shop">
            🏪 
        </div>

        <!-- DESKRIPSI -->

        <div class="section">

            <div class="section-title">
                Deskripsi Produk
            </div>

            <div>
                
            </div>

        </div>

        <!-- FITUR -->

        <div class="section">

            <div class="section-title">
                Fitur Produk
            </div>

            

            

        </div>

        <!-- GALERI -->

        <div class="section">

            <div class="section-title">
                Galeri Produk
            </div>

            <div class="gallery-grid">

                

            </div>

        </div>

        <!-- FORM -->

        <div class="section">

            <div class="section-title">
                Form Pemesanan
            </div>

            

            <button class="buy-btn">
                BELI SEKARANG
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>

new Swiper(".mySwiper",{

    pagination:{
        el:".swiper-pagination"
    },

    autoplay:{
        delay:3000
    }

});

</script>

</body>
</html>
