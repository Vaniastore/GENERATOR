<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Landing Page Premium</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f3f3;
}

.wrapper{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:20px;
    padding:20px;
}

.panel{
    background:#fff;
    border-radius:14px;
    padding:20px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
}

h2{
    margin-bottom:20px;
}

.form-group{
    margin-bottom:15px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ee4d2d;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
}

iframe{
    width:100%;
    height:700px;
    border:none;
    border-radius:14px;
}

.result-html{
    width:100%;
    height:400px;
    margin-top:20px;
}

.info-box{
    padding:12px;
    background:#fff3cd;
    border-radius:8px;
    font-size:13px;
    margin-bottom:15px;
    line-height:1.7;
}

@media(max-width:900px){

.wrapper{
    grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<div class="wrapper">

<!-- INPUT -->

<div class="panel">

<h2>Generator Landing Page</h2>

<div class="form-group">
<label>Nama Toko</label>
<input type="text" id="shopName">
</div>

<div class="form-group">
<label>Nama Produk</label>
<input type="text" id="productName">
</div>

<div class="form-group">
<label>Harga Sekarang</label>
<input type="text" id="priceNow">
</div>

<div class="form-group">
<label>Harga Coret</label>
<input type="text" id="priceOld">
</div>

<!-- GAMBAR -->

<div class="form-group">
<label>Link Gambar Slider 1</label>
<input type="text" id="img1">
</div>

<div class="form-group">
<label>Link Gambar Slider 2</label>
<input type="text" id="img2">
</div>

<div class="form-group">
<label>Link Gambar Slider 3</label>
<input type="text" id="img3">
</div>

<div class="form-group">
<label>Link Gambar Slider 4</label>
<input type="text" id="img4">
</div>

<div class="form-group">
<label>Link Gambar Slider 5</label>
<input type="text" id="img5">
</div>

<div class="form-group">
<label>Deskripsi Produk</label>
<textarea id="description" rows="5"></textarea>
</div>

<!-- FITUR -->

<div class="form-group">
<label>Judul Fitur 1</label>
<input type="text" id="featureTitle1">
</div>

<div class="form-group">
<label>Isi Fitur 1</label>
<textarea id="featureText1"></textarea>
</div>

<div class="form-group">
<label>Judul Fitur 2</label>
<input type="text" id="featureTitle2">
</div>

<div class="form-group">
<label>Isi Fitur 2</label>
<textarea id="featureText2"></textarea>
</div>

<div class="form-group">
<label>Judul Fitur 3</label>
<input type="text" id="featureTitle3">
</div>

<div class="form-group">
<label>Isi Fitur 3</label>
<textarea id="featureText3"></textarea>
</div>

<div class="info-box">
Gambar fitur otomatis mengambil dari:
<br><br>
Fitur 1 = Slider 1
<br>
Fitur 2 = Slider 2
<br>
Fitur 3 = Slider 3
</div>

<!-- EMBED -->

<div class="form-group">
<label>Embed Code</label>
<textarea id="embedCode" rows="5"></textarea>
</div>

<button onclick="generatePage()">
GENERATE
</button>

</div>

<!-- PREVIEW -->

<div class="panel">

<h2>Preview</h2>

<iframe id="preview"></iframe>

<h2>Hasil HTML</h2>

<textarea id="resultHtml" class="result-html"></textarea>

<button onclick="copyHtml()">
COPY HTML
</button>

</div>

</div>

<script>

function rupiah(n){

return "Rp " + Number(n || 0).toLocaleString("id-ID");

}

function generatePage(){

const v = id => document.getElementById(id).value;

const featureImg1 = v("img1");
const featureImg2 = v("img2");
const featureImg3 = v("img3");

const html = `

<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
}

.shop-bar{
padding:15px;
background:#fff;
border-bottom:1px solid #eee;
font-weight:bold;
font-size:16px;
}

.swiper img{
width:100%;
height:100%;
object-fit:cover;
}

.flash-sale{
background:#ee4d2d;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.timer{
background:#00000033;
padding:6px 10px;
border-radius:8px;
}

.content{
padding:15px;
}

.price{
font-size:30px;
font-weight:bold;
color:#ee4d2d;
}

.old-price{
text-decoration:line-through;
color:#999;
margin-left:10px;
}

.feature{
border:1px solid #eee;
border-radius:12px;
overflow:hidden;
margin-top:20px;
}

.feature img{
width:100%;
}

.feature-content{
padding:15px;
}

.testimonial{
border-bottom:1px solid #eee;
padding:15px 0;
}

.testimonial b{
display:block;
margin-bottom:6px;
}

.buy-btn{
width:100%;
padding:15px;
background:#ee4d2d;
color:#fff;
text-align:center;
border-radius:12px;
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<!-- TOKO -->

<div class="shop-bar">
🛍 ${v("shopName")}
</div>

<!-- SLIDER -->

<div class="swiper mySwiper">

<div class="swiper-wrapper">

${v("img1") ? `
<div class="swiper-slide">
<img src="${v("img1")}">
</div>
` : ""}

${v("img2") ? `
<div class="swiper-slide">
<img src="${v("img2")}">
</div>
` : ""}

${v("img3") ? `
<div class="swiper-slide">
<img src="${v("img3")}">
</div>
` : ""}

${v("img4") ? `
<div class="swiper-slide">
<img src="${v("img4")}">
</div>
` : ""}

${v("img5") ? `
<div class="swiper-slide">
<img src="${v("img5")}">
</div>
` : ""}

</div>

</div>

<!-- FLASH SALE -->

<div class="flash-sale">

<div>
FLASH SALE 🔥
</div>

<div class="timer" id="timer">
12:00:00
</div>

</div>

<div class="content">

<div class="price">
${rupiah(v("priceNow"))}

<span class="old-price">
${rupiah(v("priceOld"))}
</span>

</div>

<h2 style="margin-top:10px;">
${v("productName")}
</h2>

<p style="margin-top:15px;line-height:1.7;">
${v("description")}
</p>

<!-- FITUR -->

${featureImg1 ? `
<div class="feature">

<img src="${featureImg1}">

<div class="feature-content">

<h3>${v("featureTitle1")}</h3>

<p>${v("featureText1")}</p>

</div>

</div>
` : ""}

${featureImg2 ? `
<div class="feature">

<img src="${featureImg2}">

<div class="feature-content">

<h3>${v("featureTitle2")}</h3>

<p>${v("featureText2")}</p>

</div>

</div>
` : ""}

${featureImg3 ? `
<div class="feature">

<img src="${featureImg3}">

<div class="feature-content">

<h3>${v("featureTitle3")}</h3>

<p>${v("featureText3")}</p>

</div>

</div>
` : ""}

<!-- TESTIMONI -->

<h2 style="margin-top:30px;">
Testimoni
</h2>

<div class="testimonial">
<b>Jessica ⭐⭐⭐⭐⭐</b>
Produk bagus banget, packing aman dan pengiriman cepat.
</div>

<div class="testimonial">
<b>Rina ⭐⭐⭐⭐⭐</b>
Sesuai deskripsi, kualitas premium.
</div>

<div class="testimonial">
<b>Nabila ⭐⭐⭐⭐⭐</b>
Udah repeat order, recommended banget.
</div>

<!-- EMBED -->

<div style="margin-top:25px;">

${v("embedCode")}

</div>


</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"><\/script>

<script>

new Swiper(".mySwiper",{

autoplay:{
delay:3000
}

});

let time = 43200;

setInterval(()=>{

let h = Math.floor(time/3600);
let m = Math.floor((time%3600)/60);
let s = time%60;

document.getElementById("timer").innerHTML =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

if(time > 0){
time--;
}

},1000);

<\/script>

</body>
</html>

`;

document.getElementById("preview").srcdoc = html;

document.getElementById("resultHtml").value = html;

}

function copyHtml(){

const textarea = document.getElementById("resultHtml");

textarea.select();

document.execCommand("copy");

alert("HTML berhasil di copy");

}

generatePage();

</script>

</body>
</html>
